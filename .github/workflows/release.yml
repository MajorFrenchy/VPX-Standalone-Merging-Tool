name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow olefile tkinterdnd2

      - name: Build binary
        shell: bash
        run: |
          APP_VER="${GITHUB_REF_NAME#v}"
          pyinstaller --noconfirm --windowed --name "VPXmerge_v${APP_VER}" VPXmerge.py

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_VER="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent "dist/VPXmerge_v${APP_VER}.app" "dist/VPXmerge_v${APP_VER}-macOS.zip"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          APP_VER="${GITHUB_REF_NAME#v}"
          cd dist
          tar -czf "VPXmerge_v${APP_VER}-Linux.tar.gz" "VPXmerge_v${APP_VER}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $appVer = "${env:GITHUB_REF_NAME}".TrimStart("v")
          Compress-Archive -Path "dist/VPXmerge_v$appVer/*" -DestinationPath "dist/VPXmerge_v$appVer-Windows.zip" -Force

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge-${{ github.ref_name }}-macOS
          path: dist/VPXmerge_${{ github.ref_name }}-macOS.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge-${{ github.ref_name }}-Linux
          path: dist/VPXmerge_${{ github.ref_name }}-Linux.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge-${{ github.ref_name }}-Windows
          path: dist/VPXmerge_${{ github.ref_name }}-Windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
          generate_release_notes: true
