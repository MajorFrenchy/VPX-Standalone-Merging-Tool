name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow olefile tkinterdnd2

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --noconfirm --windowed --name VPXmerge_v1.7 VPXmerge.py

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/VPXmerge_v1.7.app dist/VPXmerge_v1.7-macos.zip

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf VPXmerge_v1.7-linux.tar.gz VPXmerge_v1.7

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/VPXmerge_v1.7.exe -DestinationPath dist/VPXmerge_v1.7-windows.zip -Force

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge_v1.7-macos
          path: dist/VPXmerge_v1.7-macos.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge_v1.7-linux
          path: dist/VPXmerge_v1.7-linux.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge_v1.7-windows
          path: dist/VPXmerge_v1.7-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
          generate_release_notes: true
