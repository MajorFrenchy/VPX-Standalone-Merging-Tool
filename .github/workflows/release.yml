name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
            linux_arch: amd64
          - os: ubuntu-24.04-arm
            linux_arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow olefile tkinterdnd2

      - name: Build binary
        shell: bash
        run: |
          APP_VER="${GITHUB_REF_NAME#v}"
          pyinstaller --noconfirm --windowed --name "VPXmerge_v${APP_VER}" VPXmerge.py

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_VER="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent "dist/VPXmerge_v${APP_VER}.app" "dist/VPXmerge_v${APP_VER}-macOS.zip"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          APP_VER="${GITHUB_REF_NAME#v}"
          APP_NAME="VPXmerge_v${APP_VER}"
          ARCH="${{ matrix.linux_arch }}"
          APP_DIR="dist/${APP_NAME}"
          BIN_PATH="${APP_DIR}/${APP_NAME}"
          REAL_BIN="${APP_DIR}/${APP_NAME}.bin"
          INTERNAL_DIR="${APP_DIR}/_internal"
          PILLOW_DIR="${INTERNAL_DIR}/pillow.libs"
          TAR_NAME="${APP_NAME}-linux-${ARCH}.tar.gz"
          RUN_NAME="${APP_NAME}-linux-${ARCH}.run"

          mv "${BIN_PATH}" "${REAL_BIN}"

          cat > "${BIN_PATH}" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          APP_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          INTERNAL_DIR="$APP_DIR/_internal"
          PILLOW_DIR="$INTERNAL_DIR/pillow.libs"
          REAL_BIN="$APP_DIR/__REAL_BIN__"

          if [ -d "$PILLOW_DIR" ]; then
            XCB_CANDIDATE="$(find "$PILLOW_DIR" -maxdepth 1 -name 'libxcb-*.so.1*' | head -n 1)"
            if [ -n "${XCB_CANDIDATE:-}" ] && [ ! -e "$INTERNAL_DIR/libxcb.so.1" ]; then
              ln -s "pillow.libs/$(basename "$XCB_CANDIDATE")" "$INTERNAL_DIR/libxcb.so.1"
            fi
          fi

          export LD_LIBRARY_PATH="$INTERNAL_DIR:$PILLOW_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          exec "$REAL_BIN" "$@"
          EOF

          sed -i "s|__REAL_BIN__|${APP_NAME}.bin|g" "${BIN_PATH}"
          chmod +x "${BIN_PATH}" "${REAL_BIN}"

          cd dist
          tar -czf "${TAR_NAME}" "${APP_NAME}"

          cat > "${RUN_NAME}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail

          SELF_PATH="\$(readlink -f "\$0")"
          PAYLOAD_LINE="\$(awk '/^__ARCHIVE_BELOW__$/ { print NR + 1; exit 0; }' "\$SELF_PATH")"

          if [ -z "\$PAYLOAD_LINE" ]; then
            printf 'Payload marker not found.\n' >&2
            exit 1
          fi

          INSTALL_BASE="\${XDG_DATA_HOME:-\$HOME/.local/share}"
          INSTALL_DIR="\$INSTALL_BASE/${APP_NAME}"
          mkdir -p "\$INSTALL_BASE"
          tail -n "+\$PAYLOAD_LINE" "\$SELF_PATH" | tar -xz -C "\$INSTALL_BASE"
          exec "\$INSTALL_DIR/${APP_NAME}" "\$@"
          __ARCHIVE_BELOW__
          EOF

          cat "${TAR_NAME}" >> "${RUN_NAME}"
          chmod +x "${RUN_NAME}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $appVer = "${env:GITHUB_REF_NAME}".TrimStart("v")
          Compress-Archive -Path "dist/VPXmerge_v$appVer/*" -DestinationPath "dist/VPXmerge_v$appVer-Windows.zip" -Force

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge-${{ github.ref_name }}-macOS
          path: dist/VPXmerge_${{ github.ref_name }}-macOS.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge-${{ github.ref_name }}-Linux-${{ matrix.linux_arch }}
          path: |
            dist/VPXmerge_${{ github.ref_name }}-linux-${{ matrix.linux_arch }}.tar.gz
            dist/VPXmerge_${{ github.ref_name }}-linux-${{ matrix.linux_arch }}.run

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VPXmerge-${{ github.ref_name }}-Windows
          path: dist/VPXmerge_${{ github.ref_name }}-Windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.run
          generate_release_notes: true
